name: Security Scan & Test

on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Update en upgrade OS-packages
      run: sudo apt-get update && sudo apt-get upgrade -y

    - name: Installeer Trivy (indien niet standaard aanwezig)
      run: |
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_amd64.deb
        sudo dpkg -i trivy_amd64.deb
        
    - name: Install dependencies
      run: pip install flask bandit

    - name: Run Bandit (Static Code Analysis)
      run: bandit -r ./app

    - name: Scan repository for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'
        
    - name: Build container image
      run: |
        docker build -t secure-app:latest ./app
        
    - name: Scan container image
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'secure-app'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'
